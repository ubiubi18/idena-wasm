name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

defaults:
  run:
    shell: bash
jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Validate tag
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Unsupported release tag: ${tag}" >&2
            exit 1
          fi

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked --all-targets --all-features

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Audit
        run: cargo audit

  release:
    needs: preflight
    env:
      BINARY_NAME: libidena_wasm.a
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: linux-x64
            os: ubuntu-24.04
            artifact_name: 'libidena_wasm_linux_amd64.a'
            target: ''
          - build: macos-x64
            os: macos-15-intel
            artifact_name: 'libidena_wasm_darwin_amd64.a'
            target: x86_64-apple-darwin
          - build: macos-arm64
            os: macos-15
            artifact_name: 'libidena_wasm_darwin_arm64.a'
            target: aarch64-apple-darwin
          - build: windows-x64
            os: windows-2025
            artifact_name: 'libidena_wasm_windows_amd64.a'
            target: x86_64-pc-windows-gnu
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        if: matrix.target == ''
        with:
          toolchain: 1.97.0

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        if: matrix.target != ''
        with:
          toolchain: 1.97.0
          targets: ${{ matrix.target }}

      - name: Install Windows GNU linker
        if: matrix.os == 'windows-latest'
        run: choco install -y mingw

      - name: Build
        env:
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          target="${MATRIX_TARGET}"
          if [[ -n "${target}" ]]; then
            cargo build --locked --release --all-features --target "${target}"
          else
            cargo build --locked --release --all-features
          fi

      - name: Rename output file
        env:
          MATRIX_ARTIFACT_NAME: ${{ matrix.artifact_name }}
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          asset_name="${MATRIX_ARTIFACT_NAME}"
          if [[ -n "${MATRIX_TARGET}" ]]; then
            mv "target/${MATRIX_TARGET}/release/${BINARY_NAME}" "${asset_name}"
          else
            mv "target/release/${BINARY_NAME}" "${asset_name}"
          fi
          openssl dgst -sha256 -r "${asset_name}" > "${asset_name}.sha256"
          echo "ASSET_NAME=${asset_name}" >> "$GITHUB_ENV"
      - name: Release
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d # v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ${{ env.ASSET_NAME }}
            ${{ env.ASSET_NAME }}.sha256

  linux_aarch64:
    needs: preflight
    name: Linux aarch64
    runs-on: ubuntu-24.04-arm
    env:
      BINARY_NAME: libidena_wasm.a
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Build idena-wasm binary
        run: cargo build --locked --release --all-features
      - name: Rename output file
        run: |
          asset_name=libidena_wasm_linux_aarch64.a
          cp "target/release/${BINARY_NAME}" "${asset_name}"
          openssl dgst -sha256 -r "${asset_name}" > "${asset_name}.sha256"
          echo "ASSET_NAME=${asset_name}" >> "$GITHUB_ENV"
      - name: Release
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d # v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ${{ env.ASSET_NAME }}
            ${{ env.ASSET_NAME }}.sha256
