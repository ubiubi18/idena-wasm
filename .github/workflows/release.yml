name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

defaults:
  run:
    shell: bash
jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Validate tag
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Unsupported release tag: ${tag}" >&2
            exit 1
          fi

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-targets --all-features

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Audit
        run: cargo audit

  release:
    needs: preflight
    env:
      BINARY_NAME: libidena_wasm.a
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: linux-x64
            os: ubuntu-latest
            artifact_name: 'libidena_wasm_linux_amd64.a'
            target: ''
          - build: macos-x64
            os: macos-latest
            artifact_name: 'libidena_wasm_darwin_amd64.a'
            target: ''
          - build: macos-arm64
            os: macos-latest
            artifact_name: 'libidena_wasm_darwin_arm64.a'
            target: aarch64-apple-darwin
          - build: windows-x64
            os: windows-latest
            artifact_name: 'libidena_wasm_windows_amd64.a'
            target: x86_64-pc-windows-gnu
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.target == ''

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.target != ''
        with:
          targets: ${{ matrix.target }}

      - name: Install Windows GNU linker
        if: matrix.os == 'windows-latest'
        run: choco install -y mingw

      - name: Build
        env:
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          target="${MATRIX_TARGET}"
          if [[ -n "${target}" ]]; then
            cargo build --release --all-features --target "${target}"
          else
            cargo build --release --all-features
          fi

      - name: Rename output file
        env:
          MATRIX_ARTIFACT_NAME: ${{ matrix.artifact_name }}
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          asset_name="${MATRIX_ARTIFACT_NAME}"
          if [[ -n "${MATRIX_TARGET}" ]]; then
            mv "target/${MATRIX_TARGET}/release/${BINARY_NAME}" "${asset_name}"
          else
            mv "target/release/${BINARY_NAME}" "${asset_name}"
          fi
          echo "ASSET_NAME=${asset_name}" >> "$GITHUB_ENV"
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ${{ env.ASSET_NAME }}

  linux_aarch64:
    needs: preflight
    name: Linux aarch64
    runs-on: ubuntu-latest
    env:
      BINARY_NAME: libidena_wasm.a
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Build cross image
        run: |
          docker build -t idena-wasm/aarch64 "${GITHUB_WORKSPACE}/.github/cross-linux-aarch64/"
        env:
          CROSS_DOCKER_IN_DOCKER: true
      - name: Build idena-wasm binary
        run: |
          docker run \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${GITHUB_WORKSPACE}:/project" \
            -w /project \
            -e CROSS_DOCKER_IN_DOCKER=true \
            -e PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig \
            -e PKG_CONFIG_ALLOW_CROSS=true \
            idena-wasm/aarch64 \
            cross build --target=aarch64-unknown-linux-gnu --release
        env:
          CROSS_DOCKER_IN_DOCKER: true
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: true
      - name: Rename output file
        run: |
          asset_name=libidena_wasm_linux_aarch64.a
          cp "target/aarch64-unknown-linux-gnu/release/${BINARY_NAME}" "${asset_name}"
          echo "ASSET_NAME=${asset_name}" >> "$GITHUB_ENV"
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ${{ env.ASSET_NAME }}
