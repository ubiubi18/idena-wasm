name: Legacy Wasm compatibility

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  legacy-wasm-compatibility:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0
      - name: Verify compatibility lock
        run: python3 scripts/check-compatibility-lock.py
      - name: Run locked runtime fixtures
        run: cargo test --locked --all-targets --all-features
