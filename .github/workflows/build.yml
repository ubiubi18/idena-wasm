name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15-intel, macos-15]
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0

      - name: Build
        run: cargo build --release --all-features
